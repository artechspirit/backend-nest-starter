services:
  postgres:
    image: postgres:16-alpine
    container_name: backend-starterkit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: backend_starterkit
    ports:
      - '5432:5432'
    volumes:
      - backend_starterkit_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: backend-starterkit-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - backend_starterkit_redis_data:/data

  minio:
    image: minio/minio
    container_name: backend-starterkit-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - backend_starterkit_minio_data:/data

volumes:
  backend_starterkit_postgres_data:
  backend_starterkit_redis_data:
  backend_starterkit_minio_data: