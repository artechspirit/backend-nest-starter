<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification</title>
  <style>
    body {
      background-color: #090D16;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #F3F4F6;
      margin: 0;
      padding: 0;
    }
    .email-container {
      max-width: 600px;
      margin: 40px auto;
      background: rgba(17, 22, 37, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo-text {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #06B6D4 0%, #8B5CF6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #FFFFFF;
      margin-top: 0;
      margin-bottom: 20px;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #9CA3AF;
      margin-bottom: 30px;
    }
    .notification-content {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      padding: 20px;
      border-left: 4px solid #06B6D4;
      margin-bottom: 30px;
      font-size: 15px;
      color: #D1D5DB;
    }
    .footer {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 20px;
      text-align: center;
      font-size: 12px;
      color: #4B5563;
    }
  </style>
</head>
<body>
  <div class="email-container">
    <div class="logo">
      <span class="logo-text">ANTIGRAVITY STARTERKIT</span>
    </div>
    <h1>{{title}}</h1>
    <p>Hi {{name}},</p>
    <div class="notification-content">
      {{content}}
    </div>
    <div class="footer">
      <p style="margin: 0; font-size: 12px; color: #4B5563;">&copy; 2026 Antigravity Starterkit. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
